services:

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: prestamos_empleados
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"  # 3307 en tu PC → 3306 dentro del contenedor
                     # Usamos 3307 para no chocar con MySQL local si lo tienes instalado
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .           # Construye la imagen usando el Dockerfile de esta carpeta
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app         # Sincroniza tu código local con el contenedor en tiempo real
    ports:
      - "8000:8000"
    env_file:
      - .env           # Carga las variables del archivo .env
    depends_on:
      db:
        condition: service_healthy   # Espera que MySQL esté listo antes de arrancar Django
